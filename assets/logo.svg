<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="gbf-tools">
  <defs>
    <linearGradient id="sky" x1="64" y1="40" x2="448" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6cc0ff"/>
      <stop offset="0.45" stop-color="#2a86f0"/>
      <stop offset="1" stop-color="#0a47b0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.16" r="0.85">
      <stop offset="0" stop-color="#bfe4ff" stop-opacity="0.8"/>
      <stop offset="0.45" stop-color="#bfe4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gearfill" x1="160" y1="150" x2="352" y2="378" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dcebff"/>
    </linearGradient>
    <linearGradient id="hole" x1="216" y1="216" x2="296" y2="296" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a3c9a"/>
      <stop offset="1" stop-color="#1f6fe0"/>
    </linearGradient>
    <linearGradient id="spark" x1="356" y1="120" x2="404" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe9a8"/>
      <stop offset="1" stop-color="#ffc24d"/>
    </linearGradient>
    <clipPath id="round"><rect x="16" y="16" width="480" height="480" rx="108"/></clipPath>
  </defs>

  <!-- 圓角方底 + 藍天漸層 -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#sky)"/>

  <!-- 裝飾層（裁進圓角，不破角） -->
  <g clip-path="url(#round)">
    <rect x="16" y="16" width="480" height="480" fill="url(#glow)"/>
    <ellipse cx="248" cy="70" rx="236" ry="96" fill="#ffffff" opacity="0.14"/>
    <ellipse cx="256" cy="540" rx="300" ry="180" fill="#001b4d" opacity="0.2"/>
  </g>

  <!-- 齒輪（8 齒，工具象徵） -->
  <g fill="url(#gearfill)">
    <rect x="226" y="92" width="60" height="78" rx="16"/>
    <g transform="rotate(45 256 256)"><rect x="226" y="92" width="60" height="78" rx="16"/></g>
    <g transform="rotate(90 256 256)"><rect x="226" y="92" width="60" height="78" rx="16"/></g>
    <g transform="rotate(135 256 256)"><rect x="226" y="92" width="60" height="78" rx="16"/></g>
    <g transform="rotate(180 256 256)"><rect x="226" y="92" width="60" height="78" rx="16"/></g>
    <g transform="rotate(225 256 256)"><rect x="226" y="92" width="60" height="78" rx="16"/></g>
    <g transform="rotate(270 256 256)"><rect x="226" y="92" width="60" height="78" rx="16"/></g>
    <g transform="rotate(315 256 256)"><rect x="226" y="92" width="60" height="78" rx="16"/></g>
    <circle cx="256" cy="256" r="132"/>
  </g>
  <!-- 齒輪中心孔（凹陷藍） -->
  <circle cx="256" cy="256" r="62" fill="url(#hole)"/>
  <circle cx="256" cy="256" r="62" fill="none" stroke="#06286b" stroke-opacity="0.35" stroke-width="6"/>

  <!-- 金色 spark（青箱喜悅） -->
  <path d="M380 116 C 384 146, 392 154, 422 158 C 392 162, 384 170, 380 200 C 376 170, 368 162, 338 158 C 368 154, 376 146, 380 116 Z" fill="url(#spark)"/>

  <!-- rim 描邊 -->
  <rect x="17.5" y="17.5" width="477" height="477" rx="106.5" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="3"/>
</svg>
